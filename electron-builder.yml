appId: com.odontosoft.desktop
productName: OdontoSoft Desktop
copyright: Copyright © 2024 OdontoSoft

directories:
  buildResources: build
  output: dist

files:
  - app/main/**/*
  - app/renderer/dist/**/*
  - node_modules/**/*
  - package.json

asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# electron-updater leerá esto para saber dónde buscar nuevas versiones.
# Reemplaza `owner` con tu user/org real cuando crees el repo en GitHub.
publish:
  - provider: github
    owner: odontosoft
    repo: desktop
    releaseType: release

