name: Release

on:
  push:
    tags:
      - "v*"   # Cualquier tag que empiece con v (ej: v1.0.0, v1.1.2)

# Permisos para que electron-builder pueda crear el release y subir assets.
permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Por ahora sólo Windows: tu mercado principal está en Windows.
        # Para activar macOS/Linux, agrega macos-latest y/o ubuntu-latest aquí.
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (necesario para node-gyp / electron-rebuild)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: bun install

      - name: Install main + renderer dependencies
        run: |
          cd app/main && bun install
          cd ../renderer && bun install

      - name: Generate icons (.ico, .icns, .png) from SVG
        run: bun run icons

      - name: Build renderer
        run: bun run build:renderer

      - name: Rebuild native modules for Electron
        working-directory: app/main
        run: bunx electron-rebuild -f -w better-sqlite3
        shell: bash

      # Para firmar el .exe (recomendado en producción, evita la alerta de
      # SmartScreen) configura estos dos secrets en el repo:
      #   Settings → Secrets and variables → Actions:
      #     CSC_LINK            → contenido del .pfx en base64
      #     CSC_KEY_PASSWORD    → contraseña del .pfx
      # Si no están configurados, el build sigue funcionando pero el .exe queda
      # sin firmar. NO definimos CSC_LINK como string vacío porque
      # electron-builder lo interpreta como una ruta y revienta.
      - name: Build & Publish (electron-builder)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_CSC_LINK: ${{ secrets.CSC_LINK }}
          SECRET_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$SECRET_CSC_LINK" ]; then
            echo "Code signing enabled"
            export CSC_LINK="$SECRET_CSC_LINK"
            export CSC_KEY_PASSWORD="$SECRET_CSC_KEY_PASSWORD"
          else
            echo "Building unsigned (no CSC_LINK secret configured)"
          fi
          bunx electron-builder --publish always
